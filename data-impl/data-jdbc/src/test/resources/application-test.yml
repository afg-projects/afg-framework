spring:
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog.xml
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 60000

afg:
  data:
    enabled: true
    jdbc:
      metrics:
        enabled: false
      cache:
        enabled: false

logging:
  level:
    io.github.afgprojects: DEBUG