databaseChangeLog:
  - changeSet:
      id: auth-user-role
      author: afg
      changes:
        - createTable:
            tableName: auth_user_role
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: tenant_id
                  type: VARCHAR(50)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            tableName: auth_user_role
            indexName: idx_user_role_tenant
            columns:
              - column:
                  name: user_id
              - column:
                  name: role_id
              - column:
                  name: tenant_id
            unique: true
