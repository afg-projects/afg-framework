databaseChangeLog:
  - changeSet:
      id: auth-token-blacklist
      author: afg
      changes:
        - createTable:
            tableName: auth_token_blacklist
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: token_hash
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    uniqueConstraintName: uk_token_blacklist_hash
              - column:
                  name: user_id
                  type: VARCHAR(50)
              - column:
                  name: reason
                  type: VARCHAR(100)
              - column:
                  name: expires_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
        - createIndex:
            tableName: auth_token_blacklist
            indexName: idx_token_blacklist_expires
            columns:
              - column:
                  name: expires_at
