databaseChangeLog:
  - changeSet:
      id: auth-security-event
      author: afg
      changes:
        - createTable:
            tableName: auth_security_event
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: event_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(50)
              - column:
                  name: tenant_id
                  type: VARCHAR(50)
              - column:
                  name: ip
                  type: VARCHAR(50)
              - column:
                  name: details
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: auth_security_event
            indexName: idx_security_event_type
            columns:
              - column:
                  name: event_type
        - createIndex:
            tableName: auth_security_event
            indexName: idx_security_event_time
            columns:
              - column:
                  name: created_at
