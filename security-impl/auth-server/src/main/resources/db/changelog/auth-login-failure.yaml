databaseChangeLog:
  - changeSet:
      id: auth-login-failure
      author: afg
      changes:
        - createTable:
            tableName: auth_login_failure
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: VARCHAR(50)
              - column:
                  name: tenant_id
                  type: VARCHAR(50)
              - column:
                  name: ip
                  type: VARCHAR(50)
              - column:
                  name: failure_count
                  type: INT
                  defaultValueNumeric: 1
              - column:
                  name: locked_until
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - createIndex:
            tableName: auth_login_failure
            indexName: idx_login_failure_user_tenant
            columns:
              - column:
                  name: user_id
              - column:
                  name: tenant_id
            unique: true
