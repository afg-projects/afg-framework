databaseChangeLog:
  - changeSet:
      id: auth-login-log
      author: afg
      changes:
        - createTable:
            tableName: auth_login_log
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: VARCHAR(50)
              - column:
                  name: username
                  type: VARCHAR(100)
              - column:
                  name: tenant_id
                  type: VARCHAR(50)
              - column:
                  name: ip
                  type: VARCHAR(50)
              - column:
                  name: device_id
                  type: VARCHAR(100)
              - column:
                  name: device_name
                  type: VARCHAR(200)
              - column:
                  name: browser
                  type: VARCHAR(100)
              - column:
                  name: os
                  type: VARCHAR(100)
              - column:
                  name: location
                  type: VARCHAR(200)
              - column:
                  name: result
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: fail_reason
                  type: VARCHAR(200)
              - column:
                  name: login_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: logout_time
                  type: TIMESTAMP
        - createIndex:
            tableName: auth_login_log
            indexName: idx_login_log_user
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: auth_login_log
            indexName: idx_login_log_time
            columns:
              - column:
                  name: login_time
