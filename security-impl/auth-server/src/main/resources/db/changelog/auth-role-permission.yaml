databaseChangeLog:
  - changeSet:
      id: auth-role-permission
      author: afg
      changes:
        - createTable:
            tableName: auth_role_permission
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: role_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: permission
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: tenant_id
                  type: VARCHAR(50)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            tableName: auth_role_permission
            indexName: idx_role_perm_tenant
            columns:
              - column:
                  name: role_id
              - column:
                  name: permission
              - column:
                  name: tenant_id
            unique: true
