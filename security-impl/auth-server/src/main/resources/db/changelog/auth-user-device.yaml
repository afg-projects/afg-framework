databaseChangeLog:
  - changeSet:
      id: auth-user-device
      author: afg
      changes:
        - createTable:
            tableName: auth_user_device
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: VARCHAR(50)
              - column:
                  name: tenant_id
                  type: VARCHAR(50)
              - column:
                  name: device_id
                  type: VARCHAR(100)
              - column:
                  name: device_name
                  type: VARCHAR(200)
              - column:
                  name: device_type
                  type: VARCHAR(50)
              - column:
                  name: last_login_ip
                  type: VARCHAR(50)
              - column:
                  name: last_login_time
                  type: TIMESTAMP
              - column:
                  name: status
                  type: TINYINT
                  defaultValueNumeric: 1
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - createIndex:
            tableName: auth_user_device
            indexName: idx_user_device
            columns:
              - column:
                  name: user_id
              - column:
                  name: device_id
            unique: true
