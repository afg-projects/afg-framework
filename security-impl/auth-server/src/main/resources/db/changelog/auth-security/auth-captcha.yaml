databaseChangeLog:
  - changeSet:
      id: 1
      author: afg-framework
      comment: Create auth_captcha table for captcha storage
      changes:
        - createTable:
            tableName: auth_captcha
            remarks: Captcha storage table for image, SMS, and email captchas
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: Primary key
                  autoIncrement: true
              - column:
                  name: captcha_key
                  type: varchar(128)
                  constraints:
                    nullable: false
                    unique: true
                  remarks: Captcha key (session ID, phone number, email, etc.)
              - column:
                  name: captcha_value
                  type: varchar(32)
                  constraints:
                    nullable: false
                  remarks: Captcha value
              - column:
                  name: captcha_type
                  type: varchar(32)
                  constraints:
                    nullable: false
                  remarks: Captcha type (image, sms, email)
              - column:
                  name: tenant_id
                  type: varchar(64)
                  remarks: Tenant ID (optional)
              - column:
                  name: expires_at
                  type: timestamp
                  constraints:
                    nullable: false
                  remarks: Captcha expiration time
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
                  remarks: Captcha creation time
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 2
      author: afg-framework
      comment: Create indexes for auth_captcha table
      changes:
        - createIndex:
            indexName: idx_captcha_key
            tableName: auth_captcha
            columns:
              - column:
                  name: captcha_key
            unique: true
        - createIndex:
            indexName: idx_captcha_expires_at
            tableName: auth_captcha
            columns:
              - column:
                  name: expires_at
        - createIndex:
            indexName: idx_captcha_tenant_id
            tableName: auth_captcha
            columns:
              - column:
                  name: tenant_id
