databaseChangeLog:
  - changeSet:
      id: 1
      author: afg-framework
      comment: Create auth_token_blacklist table for token blacklist
      changes:
        - createTable:
            tableName: auth_token_blacklist
            remarks: Token blacklist table for revoked tokens
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: Primary key
                  autoIncrement: true
              - column:
                  name: token_hash
                  type: varchar(128)
                  constraints:
                    nullable: false
                    unique: true
                  remarks: Token hash value (SHA-256)
              - column:
                  name: user_id
                  type: varchar(64)
                  constraints:
                    nullable: false
                  remarks: User ID
              - column:
                  name: reason
                  type: varchar(64)
                  constraints:
                    nullable: false
                  remarks: Reason for blacklisting (logout, revoked, security_breach, etc.)
              - column:
                  name: expires_at
                  type: timestamp
                  constraints:
                    nullable: false
                  remarks: Blacklist entry expiration time (should match token remaining lifetime)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
                  remarks: Entry creation time
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 2
      author: afg-framework
      comment: Create indexes for auth_token_blacklist table
      changes:
        - createIndex:
            indexName: idx_blacklist_token_hash
            tableName: auth_token_blacklist
            columns:
              - column:
                  name: token_hash
            unique: true
        - createIndex:
            indexName: idx_blacklist_user_id
            tableName: auth_token_blacklist
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_blacklist_expires_at
            tableName: auth_token_blacklist
            columns:
              - column:
                  name: expires_at
