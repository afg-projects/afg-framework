databaseChangeLog:
  - changeSet:
      id: 1
      author: afg-framework
      comment: Create auth_user_device table for user device binding
      changes:
        - createTable:
            tableName: auth_user_device
            remarks: User device binding table for device management
            columns:
              - column:
                  name: device_id
                  type: varchar(64)
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: Device unique identifier
              - column:
                  name: user_id
                  type: varchar(64)
                  constraints:
                    nullable: false
                  remarks: User ID
              - column:
                  name: tenant_id
                  type: varchar(64)
                  remarks: Tenant ID (nullable for single-tenant scenarios)
              - column:
                  name: device_name
                  type: varchar(256)
                  remarks: Device name (e.g., "John's iPhone")
              - column:
                  name: device_type
                  type: varchar(32)
                  remarks: Device type (PC, Mobile, Tablet, etc.)
              - column:
                  name: device_os
                  type: varchar(64)
                  remarks: Device operating system
              - column:
                  name: browser
                  type: varchar(64)
                  remarks: Browser name
              - column:
                  name: last_login_ip
                  type: varchar(64)
                  remarks: Last login IP address
              - column:
                  name: last_login_time
                  type: timestamp
                  remarks: Last login time
              - column:
                  name: first_login_time
                  type: timestamp
                  remarks: First login time (device registration time)
              - column:
                  name: is_active
                  type: boolean
                  constraints:
                    nullable: false
                  remarks: Device active status
                  defaultValueBoolean: true
              - column:
                  name: is_trusted
                  type: boolean
                  constraints:
                    nullable: false
                  remarks: Device trusted status
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
                  remarks: Record creation time
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
                  remarks: Record last update time
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 2
      author: afg-framework
      comment: Create indexes for auth_user_device table
      changes:
        - createIndex:
            indexName: idx_user_device_user_id
            tableName: auth_user_device
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_user_device_tenant_id
            tableName: auth_user_device
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            indexName: idx_user_device_is_active
            tableName: auth_user_device
            columns:
              - column:
                  name: is_active
        - createIndex:
            indexName: idx_user_device_user_active
            tableName: auth_user_device
            columns:
              - column:
                  name: user_id
              - column:
                  name: is_active
