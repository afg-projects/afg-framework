# AFG Platform Error Messages (English)
# Error code range: 10000-19999

# ==================== Success (10000) ====================
10000=Success

# ==================== General Errors (10001-10099) ====================
10001=Operation failed
10002=Invalid parameter
10003=Missing parameter
10004=Invalid parameter format

# ==================== Resource Errors (10100-10199) ====================
10100=Resource not found
10101=Resource already exists
10102=Resource is locked
10103={0} not found
10104={0} already exists

# ==================== Request Errors (10200-10299) ====================
10200=Method not allowed
10201=Unsupported media type
10202=Request timeout
10203=Payload too large

# ==================== Rate Limit Errors (10300-10399) ====================
10300=Too many requests
10301=Rate limit exceeded
10302=Circuit breaker is open

# ==================== Authentication Errors (10400-10499) ====================
10400=Unauthorized or session expired
10401=Token has expired
10402=Invalid token
10403=Access denied
10404=Permission denied
10405=Account is disabled
10406=Account is locked
10407=Password has expired

# ==================== Data Layer Errors (11000-11999) ====================
11000=Entity not found
11001=Entity already exists
11002=Field not found
11003=Table not found
11004=DDL execution failed
11005=Query execution failed
11006=Data integrity violation
11007=Optimistic lock conflict
11008={0} not found: {1}
11009={0} already exists: {1}

# ==================== Storage Errors (12000-12999) ====================
12000=File not found
12001=File upload failed
12002=File download failed
12003=File type not allowed
12004=File size exceeded
12005=Storage is full
12006=File size exceeds limit, maximum allowed is {0}MB

# ==================== Job Errors (13000-13999) ====================
13000=Job not found
13001=Job execution failed
13002=Job is already running
13003=Job is paused
13004=Job is disabled

# ==================== HTTP Client Errors (14000-14999) ====================
14000=HTTP request failed
14001=HTTP request timeout
14002=HTTP connection failed
14003=HTTP retry exhausted
14004=HTTP circuit breaker is open

# ==================== Module Errors (15000-15999) ====================
15000=Module not found
15001=Module already exists
15002=Module circular dependency
15003=Module initialization failed
15004=Module {0} not found
15005=Module {0} already exists
15006=Module has circular dependency: {0}

# ==================== Config Errors (16000-16999) ====================
16000=Configuration not found
16001=Configuration binding failed
16002=Configuration {0} not found

# ==================== Feature Toggle Errors (17000-17999) ====================
17000=Feature is disabled
17001=Feature fallback failed
17002=Feature {0} is disabled

# ==================== System Errors (19000-19999) ====================
19000=System error
19001=Internal error
19002=Service unavailable
19003=Dependency service error
19004=Configuration error