# AFG Platform Error Messages (Chinese - Simplified)
# 错误码范围: 10000-19999

# ==================== 成功 (10000) ====================
10000=操作成功

# ==================== 通用错误 (10001-10099) ====================
10001=操作失败
10002=参数错误
10003=参数缺失
10004=参数格式错误

# ==================== 资源错误 (10100-10199) ====================
10100=资源不存在
10101=资源已存在
10102=资源已锁定
10103={0}不存在
10104={0}已存在

# ==================== 请求错误 (10200-10299) ====================
10200=请求方法不支持
10201=不支持的媒体类型
10202=请求超时
10203=请求体过大

# ==================== 限流错误 (10300-10399) ====================
10300=请求过于频繁
10301=超过限流阈值
10302=熔断器已开启

# ==================== 认证授权错误 (10400-10499) ====================
10400=未登录或登录已过期
10401=Token已过期
10402=Token无效
10403=无权限访问
10404=权限不足
10405=账号已禁用
10406=账号已锁定
10407=密码已过期

# ==================== 数据层错误 (11000-11999) ====================
11000=实体不存在
11001=实体已存在
11002=字段不存在
11003=表不存在
11004=DDL执行失败
11005=查询执行失败
11006=数据完整性冲突
11007=乐观锁冲突
11008={0}不存在: {1}
11009={0}已存在: {1}

# ==================== 存储错误 (12000-12999) ====================
12000=文件不存在
12001=文件上传失败
12002=文件下载失败
12003=文件类型不允许
12004=文件大小超限
12005=存储空间不足
12006=文件大小超过限制，最大允许 {0}MB

# ==================== 任务错误 (13000-13999) ====================
13000=任务不存在
13001=任务执行失败
13002=任务已在运行中
13003=任务已暂停
13004=任务已禁用

# ==================== HTTP Client 错误 (14000-14999) ====================
14000=HTTP请求失败
14001=HTTP请求超时
14002=HTTP连接失败
14003=HTTP重试耗尽
14004=HTTP熔断器开启

# ==================== 模块错误 (15000-15999) ====================
15000=模块不存在
15001=模块已存在
15002=模块循环依赖
15003=模块初始化失败
15004=模块 {0} 不存在
15005=模块 {0} 已存在
15006=模块存在循环依赖: {0}

# ==================== 配置错误 (16000-16999) ====================
16000=配置不存在
16001=配置绑定失败
16002=配置 {0} 不存在

# ==================== 功能开关错误 (17000-17999) ====================
17000=功能已禁用
17001=功能回退失败
17002=功能 {0} 已禁用

# ==================== 系统错误 (19000-19999) ====================
19000=系统异常
19001=内部错误
19002=服务不可用
19003=依赖服务异常
19004=配置错误
